<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Tickets — spxbi</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f11;--surface:#17171a;--surface2:#1e1e23;--surface3:#222228;--border:#2a2a32;--border2:#36363f;--text:#e8e8ed;--text2:#8888a0;--text3:#55555f;--accent:#7c6ff7;--accent2:#5a54c4;--high:#f7706f;--med:#f7a86f;--low:#6fd4a8;--open:#6fa8f7;--prog:#b86ff7;--review:#f7d46f;--done:#6fd4a8;--warn:#f7d46f;--overdue:#f7706f;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--radius:8px;--radius-lg:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.5rem;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main{padding:2rem;overflow-y:auto}
  .logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);padding:0 .5rem 1.25rem;border-bottom:1px solid var(--border);margin-bottom:.75rem;letter-spacing:.05em}
  .logo span{color:var(--text2)}
  .nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover{color:var(--text);background:var(--surface2)}
  .nav-item.active{color:var(--text);background:var(--surface2)}
  .nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .nav-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text3)}
  .sidebar-section{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;padding:.75rem .5rem .25rem}
  .new-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:var(--radius);background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;width:100%;margin-bottom:.5rem;transition:background .15s}
  .new-btn:hover{background:var(--accent2)}
  .sync-status{margin-top:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);padding:.5rem}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
  .sync-dot.online{background:var(--done);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .who-badge{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);margin-bottom:.5rem;font-size:12px;color:var(--text2);cursor:pointer}
  .who-badge:hover{border-color:var(--border2);color:var(--text)}
  .warn-banner{background:rgba(247,212,111,.06);border:1px solid rgba(247,212,111,.2);border-radius:var(--radius-lg);padding:.75rem 1rem;margin-bottom:1.25rem;display:none}
  .warn-banner.visible{display:block}
  .warn-banner-title{font-size:11px;font-weight:500;color:var(--warn);margin-bottom:8px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
  .warn-item{font-size:12px;color:var(--text2);padding:4px 0;display:flex;align-items:center;gap:8px;cursor:pointer}
  .warn-item:hover{color:var(--text)}
  .warn-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--mono);flex-shrink:0}
  .badge-overdue{background:rgba(247,112,111,.15);color:var(--overdue);border:1px solid rgba(247,112,111,.25)}
  .badge-soon{background:rgba(247,212,111,.12);color:var(--warn);border:1px solid rgba(247,212,111,.2)}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  .page-title{font-size:20px;font-weight:500}
  .page-sub{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.75rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem}
  .stat-label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
  .stat-num{font-size:26px;font-weight:300;font-family:var(--mono)}
  .stat-num.c-high{color:var(--high)}.stat-num.c-prog{color:var(--prog)}.stat-num.c-done{color:var(--done)}
  .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
  .filter-pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
  .filter-pill:hover{border-color:var(--border2);color:var(--text)}
  .filter-pill.active{border-color:var(--accent);color:var(--accent);background:rgba(124,111,247,.08)}
  .search{flex:1;max-width:260px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;outline:none}
  .search:focus{border-color:var(--accent)}
  .search::placeholder{color:var(--text3)}
  .ticket-list{display:flex;flex-direction:column;gap:6px}
  .ticket{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1.1rem;cursor:pointer;transition:all .15s;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
  .ticket:hover{border-color:var(--border2);background:var(--surface2);transform:translateX(2px)}
  .ticket.is-overdue{border-color:rgba(247,112,111,.35)}
  .ticket.is-soon{border-color:rgba(247,212,111,.35)}
  .ticket-left{display:flex;flex-direction:column;align-items:center;gap:6px}
  .priority-bar{width:3px;height:36px;border-radius:2px}
  .priority-bar.high{background:var(--high)}.priority-bar.medium{background:var(--med)}.priority-bar.low{background:var(--low)}
  .ticket-body{min-width:0}
  .ticket-id{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px}
  .ticket-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
  .ticket-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text3);flex-wrap:wrap}
  .ticket-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .status-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--mono);letter-spacing:.03em;white-space:nowrap}
  .s-open{background:rgba(111,168,247,.12);color:var(--open);border:1px solid rgba(111,168,247,.2)}
  .s-progress{background:rgba(184,111,247,.12);color:var(--prog);border:1px solid rgba(184,111,247,.2)}
  .s-review{background:rgba(247,212,111,.12);color:var(--review);border:1px solid rgba(247,212,111,.2)}
  .s-done{background:rgba(111,212,168,.12);color:var(--done);border:1px solid rgba(111,212,168,.2)}
  .deadline-tag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;white-space:nowrap}
  .dl-ok{color:var(--text3)}
  .dl-soon{color:var(--warn);background:rgba(247,212,111,.1);border:1px solid rgba(247,212,111,.2)}
  .dl-overdue{color:var(--overdue);background:rgba(247,112,111,.1);border:1px solid rgba(247,112,111,.2)}
  .subtask-bar{height:3px;border-radius:2px;background:var(--border2);margin-top:5px;overflow:hidden}
  .subtask-bar-fill{height:100%;border-radius:2px;background:var(--done);transition:width .3s}
  .empty-state{text-align:center;padding:4rem 2rem;color:var(--text3)}
  .empty-state p{font-size:13px;margin-top:8px}
  .loading{text-align:center;padding:3rem;color:var(--text3);font-family:var(--mono);font-size:12px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:3rem 1rem;z-index:100;backdrop-filter:blur(2px);overflow-y:auto}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:600px}
  .modal-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-header h3{font-size:15px;font-weight:500}
  .modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
  .modal-close:hover{background:var(--surface2);color:var(--text)}
  .modal-body{padding:1.25rem 1.5rem}
  .modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:70px;line-height:1.6}
  .field select option{background:var(--surface2)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:none;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .15s}
  .btn:hover{background:var(--surface2);color:var(--text)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
  .btn-danger{color:var(--high);border-color:rgba(247,112,111,.3)}
  .btn-danger:hover{background:rgba(247,112,111,.08)}
  .btn-sm{padding:4px 10px;font-size:12px}
  .btn-ghost{border-color:transparent;color:var(--text3);padding:3px 8px;font-size:12px}
  .btn-ghost:hover{color:var(--accent);background:rgba(124,111,247,.08);border-color:transparent}
  .btn-icon{border-color:transparent;background:none;color:var(--text3);padding:2px 6px;font-size:14px;cursor:pointer;border-radius:4px;border:1px solid transparent}
  .btn-icon:hover{color:var(--overdue);background:rgba(247,112,111,.08)}
  .detail-title{font-size:17px;font-weight:500;margin-bottom:8px;line-height:1.4}
  .detail-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1.25rem}
  .detail-id{font-family:var(--mono);font-size:11px;color:var(--text3)}
  .divider{height:1px;background:var(--border);margin:1.25rem 0}
  .priority-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-family:var(--mono)}
  .pb-high{background:rgba(247,112,111,.12);color:var(--high);border:1px solid rgba(247,112,111,.2)}
  .pb-medium{background:rgba(247,168,111,.12);color:var(--med);border:1px solid rgba(247,168,111,.2)}
  .pb-low{background:rgba(111,212,168,.12);color:var(--low);border:1px solid rgba(111,212,168,.2)}
  .section-label{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
  .deadline-status{margin-top:6px;font-size:12px;padding:6px 10px;border-radius:var(--radius)}
  .deadline-status.warn{color:var(--warn);background:rgba(247,212,111,.07);border:1px solid rgba(247,212,111,.2)}
  .deadline-status.over{color:var(--overdue);background:rgba(247,112,111,.07);border:1px solid rgba(247,112,111,.2)}
  .deadline-status.ok{color:var(--text3)}

  /* Subtasks */
  .subtask-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .subtask-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);font-size:13px;transition:opacity .15s}
  .subtask-item.done-task{opacity:.55}
  .subtask-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .subtask-check:hover{border-color:var(--accent)}
  .subtask-check.checked{background:var(--done);border-color:var(--done)}
  .subtask-check.checked::after{content:'✓';font-size:10px;color:#0f0f11;font-weight:700}
  .subtask-text{flex:1;color:var(--text)}
  .subtask-item.done-task .subtask-text{text-decoration:line-through;color:var(--text3)}
  .subtask-assignee{font-size:11px;color:var(--text3);flex-shrink:0}
  .subtask-progress{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
  .add-subtask-row{display:flex;gap:8px;margin-top:4px}
  .add-subtask-row input{flex:1;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none}
  .add-subtask-row input:focus{border-color:var(--accent)}
  .add-subtask-row input::placeholder{color:var(--text3)}

  /* Links */
  .link-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .link-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);font-size:13px}
  .link-icon{font-size:14px;flex-shrink:0}
  .link-url{flex:1;color:var(--accent);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
  .link-url:hover{text-decoration:underline}
  .link-label{color:var(--text2);font-size:12px;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .add-link-row{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
  .add-link-row input{padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none}
  .add-link-row input:focus{border-color:var(--accent)}
  .add-link-row input::placeholder{color:var(--text3)}
  #link-url-input{flex:2;min-width:0}
  #link-label-input{flex:1;min-width:80px}

  /* Comments */
  .comment-thread{margin-bottom:10px}
  .comment{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;border:1px solid var(--border)}
  .comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .comment-author{font-size:12px;font-weight:500}
  .comment-time{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:auto}
  .comment-text{font-size:13px;color:var(--text2);line-height:1.6}
  .comment-actions{display:flex;gap:4px;margin-top:6px}
  .replies{margin-top:8px;margin-left:20px;border-left:2px solid var(--border2);padding-left:12px;display:flex;flex-direction:column;gap:8px}
  .reply-box{margin-top:8px;margin-left:20px;border-left:2px solid var(--accent);padding-left:12px;display:flex;gap:8px;align-items:flex-start}
  .reply-box input{flex:1;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface3);color:var(--text);font-family:var(--font);font-size:12px;outline:none}
  .reply-box input:focus{border-color:var(--accent)}
  .name-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:380px;padding:1.5rem}
  .name-modal h3{font-size:16px;font-weight:500;margin-bottom:6px}
  .name-modal p{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}
</style>
</head>
<body>

<div class="modal-overlay" id="name-modal-overlay">
  <div class="name-modal">
    <h3>What's your name?</h3>
    <p>Shows up on your comments so your team knows who said what.</p>
    <div class="field"><input id="name-input" placeholder="e.g. Alex, Jordan, Sam..." maxlength="30" onkeydown="if(event.key==='Enter')saveName()" autofocus /></div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="saveName()">Let's go</button></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="logo">TICKETS<span>/spxbi</span></div>
    <div class="who-badge" onclick="changeName()" title="Click to change name">
      <div id="who-avatar" style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0"></div>
      <span id="who-name">...</span>
    </div>
    <button class="new-btn" onclick="openNewModal()">+ New Ticket</button>
    <div class="sidebar-section">Filter by status</div>
    <button class="nav-item active" id="nav-all" onclick="setFilter('all')"><span class="nav-dot" style="background:#8888a0"></span>All tickets<span class="nav-count" id="cnt-all">0</span></button>
    <button class="nav-item" id="nav-open" onclick="setFilter('open')"><span class="nav-dot" style="background:var(--open)"></span>Open<span class="nav-count" id="cnt-open">0</span></button>
    <button class="nav-item" id="nav-in progress" onclick="setFilter('in progress')"><span class="nav-dot" style="background:var(--prog)"></span>In progress<span class="nav-count" id="cnt-in progress">0</span></button>
    <button class="nav-item" id="nav-review" onclick="setFilter('review')"><span class="nav-dot" style="background:var(--review)"></span>Review<span class="nav-count" id="cnt-review">0</span></button>
    <button class="nav-item" id="nav-done" onclick="setFilter('done')"><span class="nav-dot" style="background:var(--done)"></span>Done<span class="nav-count" id="cnt-done">0</span></button>
    <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Connecting...</span></div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div><div class="page-title">Team Tickets</div><div class="page-sub" id="ticket-count-sub">Loading...</div></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-num" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Open</div><div class="stat-num c-high" id="s-open">—</div></div>
      <div class="stat"><div class="stat-label">In Progress</div><div class="stat-num c-prog" id="s-prog">—</div></div>
      <div class="stat"><div class="stat-label">Done</div><div class="stat-num c-done" id="s-done">—</div></div>
    </div>
    <div class="warn-banner" id="warn-banner">
      <div class="warn-banner-title">⚠ Deadline alerts</div>
      <div id="warn-list"></div>
    </div>
    <div class="toolbar">
      <input class="search" placeholder="Search tickets..." id="search-input" oninput="renderList()" />
      <button class="filter-pill active" id="pill-all" onclick="setFilter('all')">All</button>
      <button class="filter-pill" id="pill-open" onclick="setFilter('open')">Open</button>
      <button class="filter-pill" id="pill-in progress" onclick="setFilter('in progress')">In Progress</button>
      <button class="filter-pill" id="pill-review" onclick="setFilter('review')">Review</button>
      <button class="filter-pill" id="pill-done" onclick="setFilter('done')">Done</button>
    </div>
    <div class="ticket-list" id="ticket-list"><div class="loading">Connecting to database...</div></div>
  </main>
</div>

<!-- New Ticket Modal -->
<div class="modal-overlay" id="new-modal" style="display:none" onclick="if(event.target===this)closeNewModal()">
  <div class="modal">
    <div class="modal-header"><h3>New Ticket</h3><button class="modal-close" onclick="closeNewModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Title</label><input id="nt-title" placeholder="What needs to be done?" /></div>
      <div class="field"><label>Description</label><textarea id="nt-desc" placeholder="Add more context..."></textarea></div>
      <div class="form-row">
        <div class="field"><label>Priority</label><select id="nt-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
        <div class="field"><label>Assignee</label><input id="nt-assignee" placeholder="Name or username" /></div>
      </div>
      <div class="field"><label>Deadline (optional)</label><input type="date" id="nt-deadline" style="color-scheme:dark" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeNewModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createTicket()">Create Ticket</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal" style="display:none" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="detail-id" id="d-id"></span>
        <span id="d-priority-badge"></span>
        <span id="d-status-badge"></span>
      </div>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="detail-title" id="d-title"></div>
      <div class="detail-desc" id="d-desc"></div>

      <div class="form-row" style="margin-bottom:1rem">
        <div class="field"><label>Status</label>
          <select id="d-status-sel" onchange="updateTicketField('status',this.value)">
            <option value="open">Open</option><option value="in progress">In Progress</option><option value="review">Review</option><option value="done">Done</option>
          </select>
        </div>
        <div class="field"><label>Assignee</label><input id="d-assignee-inp" onchange="updateTicketField('assignee',this.value)" /></div>
      </div>

      <div class="field">
        <label>Deadline</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="date" id="d-deadline-inp" style="flex:1;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none;color-scheme:dark" onchange="updateTicketField('deadline',this.value)" />
          <button class="btn btn-sm" onclick="clearDeadline()">Clear</button>
        </div>
        <div id="d-deadline-status"></div>
      </div>

      <div class="divider"></div>

      <!-- Subtasks (collapsible) -->
      <div class="collapsible-header" onclick="toggleSection('subtasks')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0;margin-bottom:0;user-select:none">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-label" style="margin-bottom:0">Subtasks</span>
          <span id="d-subtask-progress" class="subtask-progress"></span>
        </div>
        <span id="subtasks-chevron" style="font-size:11px;color:var(--text3);transition:transform .2s">▶</span>
      </div>
      <div id="subtasks-body" style="display:none;margin-top:.75rem">
        <div id="d-subtask-list" class="subtask-list"></div>
        <div class="add-subtask-row">
          <input id="subtask-input" placeholder="Add a subtask..." onkeydown="if(event.key==='Enter')addSubtask()" style="flex:2;min-width:0" />
          <input type="date" id="subtask-deadline" title="Subtask deadline (optional)" style="padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:12px;outline:none;color-scheme:dark;width:140px" />
          <button class="btn btn-sm btn-primary" onclick="addSubtask()">Add</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Links (collapsible) -->
      <div class="collapsible-header" onclick="toggleSection('links')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0;margin-bottom:0;user-select:none">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-label" style="margin-bottom:0">Links</span>
          <span id="d-link-count" style="font-size:11px;color:var(--text3);font-family:var(--mono)"></span>
        </div>
        <span id="links-chevron" style="font-size:11px;color:var(--text3);transition:transform .2s">▶</span>
      </div>
      <div id="links-body" style="display:none;margin-top:.75rem">
        <div id="d-link-list" class="link-list"></div>
        <div class="add-link-row">
          <input id="link-url-input" placeholder="https://..." onkeydown="if(event.key==='Enter')addLink()" />
          <input id="link-label-input" placeholder="Label (optional)" onkeydown="if(event.key==='Enter')addLink()" />
          <button class="btn btn-sm btn-primary" onclick="addLink()">Add</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Comments -->
      <div class="section-label" id="d-comment-count">Comments</div>
      <div id="d-comments"></div>
      <div style="display:flex;gap:8px;margin-top:12px;align-items:flex-start">
        <div id="d-my-avatar" style="margin-top:2px;flex-shrink:0"></div>
        <input id="d-comment-input" placeholder="Write a comment... (Enter to post)"
          style="flex:1;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'"
          onkeydown="if(event.key==='Enter')postComment()" />
        <button class="btn btn-primary btn-sm" style="margin-top:2px" onclick="postComment()">Post</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteTicket()">Delete ticket</button>
      <button class="btn" onclick="closeDetailModal()">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.js"></script>
<script>
window.addEventListener('load', function() {

  firebase.initializeApp({
    apiKey: "AIzaSyD-NDTU5Ofkq8cxdU29TIL0J-5n4oPPlg0",
    authDomain: "spxbi-teamtickets.firebaseapp.com",
    databaseURL: "https://spxbi-teamtickets-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "spxbi-teamtickets",
    storageBucket: "spxbi-teamtickets.firebasestorage.app",
    messagingSenderId: "527260288738",
    appId: "1:527260288738:web:c94bb1db3e4b70873a00bb"
  });

  var db = firebase.database();
  var ticketsRef = db.ref('tickets');
  var allTickets = {};
  var currentFilter = 'all';
  var selectedTicketId = null;
  var currentUser = localStorage.getItem('spxbi_username') || '';
  var replyingTo = null;

  // ── Helpers ───────────────────────────────────────────────
  var COLORS = ['#7c6ff7','#6fd4a8','#f7a86f','#6fa8f7','#f7706f','#f7d46f','#b86ff7'];
  function colorFor(n){ return !n?COLORS[0]:COLORS[n.charCodeAt(0)%COLORS.length]; }
  function initials(n){ return (n||'?').slice(0,2).toUpperCase(); }
  function avatarHtml(n,s){ s=s||22; var c=colorFor(n); return '<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:'+c+'22;color:'+c+';display:flex;align-items:center;justify-content:center;font-size:'+Math.floor(s*.45)+'px;font-weight:500;flex-shrink:0">'+initials(n)+'</div>'; }
  function fmtDate(){ var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],n=new Date(); return m[n.getMonth()]+' '+n.getDate(); }
  function statusClass(s){ return s==='open'?'s-open':s==='in progress'?'s-progress':s==='review'?'s-review':'s-done'; }
  function pbClass(p){ return p==='high'?'pb-high':p==='medium'?'pb-medium':'pb-low'; }
  function pOrder(p){ return p==='high'?0:p==='medium'?1:2; }
  function countComments(c){ if(!c)return 0; return Object.values(c).reduce(function(a,x){return a+1+(x.replies?Object.keys(x.replies).length:0);},0); }
  function deadlineDiff(dl){ if(!dl)return null; var t=new Date();t.setHours(0,0,0,0); var d=new Date(dl+'T00:00:00');d.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
  function deadlineTagHtml(dl,status){
    if(!dl||status==='done') return '';
    var diff=deadlineDiff(dl); if(diff===null) return '';
    if(diff<0) return '<span class="deadline-tag dl-overdue">⏰ overdue '+Math.abs(diff)+'d</span>';
    if(diff===0) return '<span class="deadline-tag dl-soon">⏰ due today</span>';
    if(diff<=3) return '<span class="deadline-tag dl-soon">⏰ in '+diff+'d</span>';
    return '<span class="deadline-tag dl-ok">📅 '+dl+'</span>';
  }
  function ensureHttp(url){ return url&&!/^https?:\/\//i.test(url)?'https://'+url:url; }

  // ── Subtask helpers ───────────────────────────────────────
  function subtaskStats(subtasks){
    if(!subtasks) return {total:0,done:0};
    var vals=Object.values(subtasks);
    return {total:vals.length, done:vals.filter(function(s){return s.done;}).length};
  }

  // ── Warning banner ────────────────────────────────────────
  function updateWarnings(){
    var ticketItems=[];
    var subtaskItems=[];

    // Main ticket deadlines
    Object.entries(allTickets).forEach(function(e){
      var id=e[0],t=e[1];
      if(!t.deadline||t.status==='done') return;
      var diff=deadlineDiff(t.deadline); if(diff===null) return;
      if(diff<0) ticketItems.push({id:id,title:t.title,diff:diff,type:'overdue'});
      else if(diff<=3) ticketItems.push({id:id,title:t.title,diff:diff,type:'soon'});
    });

    // Subtask deadlines
    Object.entries(allTickets).forEach(function(e){
      var id=e[0],t=e[1];
      if(!t.subtasks) return;
      Object.entries(t.subtasks).forEach(function(se){
        var s=se[1];
        if(!s.deadline||s.done) return;
        var diff=deadlineDiff(s.deadline); if(diff===null) return;
        if(diff<0) subtaskItems.push({id:id,ticketTitle:t.title,subtaskTitle:s.text,diff:diff,type:'overdue'});
        else if(diff<=3) subtaskItems.push({id:id,ticketTitle:t.title,subtaskTitle:s.text,diff:diff,type:'soon'});
      });
    });

    ticketItems.sort(function(a,b){return a.diff-b.diff;});
    subtaskItems.sort(function(a,b){return a.diff-b.diff;});

    var banner=document.getElementById('warn-banner');
    var list=document.getElementById('warn-list');
    if(!ticketItems.length&&!subtaskItems.length){banner.classList.remove('visible');return;}
    banner.classList.add('visible');

    var html='';

    if(ticketItems.length){
      html+='<div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:2px">Tickets</div>';
      html+=ticketItems.map(function(it){
        var badge=it.type==='overdue'?'badge-overdue':'badge-soon';
        var label=it.type==='overdue'?'overdue '+Math.abs(it.diff)+'d':it.diff===0?'due today':'in '+it.diff+'d';
        return '<div class="warn-item" onclick="openDetailModal(\''+it.id+'\')"><span class="warn-badge '+badge+'">'+label+'</span><span>'+it.title+'</span></div>';
      }).join('');
    }

    if(subtaskItems.length){
      html+='<div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:'+(ticketItems.length?'10px':'2px')+'">Subtasks</div>';
      html+=subtaskItems.map(function(it){
        var badge=it.type==='overdue'?'badge-overdue':'badge-soon';
        var label=it.type==='overdue'?'overdue '+Math.abs(it.diff)+'d':it.diff===0?'due today':'in '+it.diff+'d';
        return '<div class="warn-item" onclick="openDetailModal(\''+it.id+'\')"><span class="warn-badge '+badge+'">'+label+'</span><span style="color:var(--text3)">'+it.ticketTitle+' &rsaquo;</span><span>'+it.subtaskTitle+'</span></div>';
      }).join('');
    }

    list.innerHTML=html;
  }

  // ── Name ──────────────────────────────────────────────────
  function updateWho(){
    var c=colorFor(currentUser);
    document.getElementById('who-name').textContent=currentUser||'...';
    var av=document.getElementById('who-avatar');
    av.style.cssText='width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:'+c+'22;color:'+c;
    av.textContent=initials(currentUser);
    var da=document.getElementById('d-my-avatar');
    if(da) da.innerHTML=avatarHtml(currentUser,22);
  }
  if(currentUser){document.getElementById('name-modal-overlay').style.display='none';updateWho();}

  window.saveName=function(){ var v=document.getElementById('name-input').value.trim(); if(!v)return; currentUser=v; localStorage.setItem('spxbi_username',v); document.getElementById('name-modal-overlay').style.display='none'; updateWho(); };
  window.changeName=function(){ var n=prompt('Change your name:',currentUser); if(n&&n.trim()){currentUser=n.trim();localStorage.setItem('spxbi_username',currentUser);updateWho();} };

  // ── Firebase ──────────────────────────────────────────────
  ticketsRef.on('value',function(snap){
    allTickets=snap.val()||{};
    updateStats();renderList();updateCounts();updateWarnings();
    document.getElementById('sync-dot').className='sync-dot online';
    document.getElementById('sync-label').textContent='Synced live';
    if(selectedTicketId&&document.getElementById('detail-modal').style.display!=='none'){
      var t=allTickets[selectedTicketId];
      if(t){
        document.getElementById('d-status-sel').value=t.status;
        document.getElementById('d-assignee-inp').value=t.assignee||'';
        renderDeadlineStatus(t.deadline,t.status);
        renderSubtasks(selectedTicketId);
        renderLinks(selectedTicketId);
        renderComments(selectedTicketId);
      }
    }
  },function(){document.getElementById('sync-label').textContent='Connection error';});

  // ── Ticket CRUD ───────────────────────────────────────────
  window.createTicket=function(){
    var title=document.getElementById('nt-title').value.trim(); if(!title){document.getElementById('nt-title').focus();return;}
    var dl=document.getElementById('nt-deadline').value;
    ticketsRef.push({title:title,desc:document.getElementById('nt-desc').value.trim()||'No description provided.',priority:document.getElementById('nt-priority').value,status:'open',assignee:document.getElementById('nt-assignee').value.trim()||'Unassigned',deadline:dl||null,created:fmtDate(),createdTs:Date.now()});
    closeNewModal();
  };
  window.updateTicketField=function(field,value){
    if(!selectedTicketId)return;
    var upd={}; upd[field]=(value===''?null:value);
    db.ref('tickets/'+selectedTicketId).update(upd);
    if(field==='status'){document.getElementById('d-status-badge').className='status-badge '+statusClass(value);document.getElementById('d-status-badge').textContent=value;renderDeadlineStatus(document.getElementById('d-deadline-inp').value,value);}
    if(field==='deadline')renderDeadlineStatus(value,document.getElementById('d-status-sel').value);
  };
  window.clearDeadline=function(){ document.getElementById('d-deadline-inp').value=''; updateTicketField('deadline',''); document.getElementById('d-deadline-status').innerHTML=''; };
  window.deleteTicket=function(){ if(!selectedTicketId)return; if(!confirm('Delete this ticket? This cannot be undone.'))return; db.ref('tickets/'+selectedTicketId).remove(); closeDetailModal(); };

  function renderDeadlineStatus(dl,status){
    var el=document.getElementById('d-deadline-status'); if(!el)return;
    if(!dl||status==='done'){el.innerHTML='';return;}
    var diff=deadlineDiff(dl); if(diff===null){el.innerHTML='';return;}
    var cls,msg;
    if(diff<0){cls='over';msg='⚠ Overdue by '+Math.abs(diff)+' day'+(Math.abs(diff)>1?'s':'');}
    else if(diff===0){cls='warn';msg='⏰ Due today!';}
    else if(diff<=3){cls='warn';msg='⏰ Due in '+diff+' day'+(diff>1?'s':'');}
    else{cls='ok';msg='📅 Due on '+dl;}
    el.innerHTML='<div class="deadline-status '+cls+'">'+msg+'</div>';
  }

  // ── Subtasks ──────────────────────────────────────────────
  // Collapsible sections
  window.toggleSection=function(section){
    var body=document.getElementById(section+'-body');
    var chevron=document.getElementById(section+'-chevron');
    if(!body)return;
    var open=body.style.display==='none';
    body.style.display=open?'block':'none';
    if(chevron)chevron.style.transform=open?'rotate(90deg)':'rotate(0deg)';
  };
  function openSection(s){
    var b=document.getElementById(s+'-body'),c=document.getElementById(s+'-chevron');
    if(b)b.style.display='block';if(c)c.style.transform='rotate(90deg)';
  }
  function closeSection(s){
    var b=document.getElementById(s+'-body'),c=document.getElementById(s+'-chevron');
    if(b)b.style.display='none';if(c)c.style.transform='rotate(0deg)';
  }
  window.addSubtask=function(){
    if(!selectedTicketId)return;
    var input=document.getElementById('subtask-input');
    var dlInput=document.getElementById('subtask-deadline');
    var text=input.value.trim(); if(!text)return;
    var dl=dlInput?dlInput.value:'';
    db.ref('tickets/'+selectedTicketId+'/subtasks').push({text:text,done:false,deadline:dl||null,createdBy:currentUser||'Unknown',ts:Date.now()});
    input.value='';
    if(dlInput)dlInput.value='';
  };

  window.toggleSubtask=function(subtaskId,currentDone){
    if(!selectedTicketId)return;
    db.ref('tickets/'+selectedTicketId+'/subtasks/'+subtaskId).update({done:!currentDone});
  };

  window.deleteSubtask=function(subtaskId){
    if(!selectedTicketId)return;
    db.ref('tickets/'+selectedTicketId+'/subtasks/'+subtaskId).remove();
  };

  function renderSubtasks(ticketId){
    var t=allTickets[ticketId]; if(!t)return;
    var subtasks=t.subtasks?Object.entries(t.subtasks).sort(function(a,b){return (a[1].ts||0)-(b[1].ts||0);}):[];
    var stats=subtaskStats(t.subtasks);
    var progressEl=document.getElementById('d-subtask-progress');
    var listEl=document.getElementById('d-subtask-list');
    if(!progressEl||!listEl)return;
    if(stats.total>0){
      var pct=Math.round(stats.done/stats.total*100);
      progressEl.textContent=stats.done+'/'+stats.total+' done ('+pct+'%)';
    } else {
      progressEl.textContent='';
    }
    if(!subtasks.length){listEl.innerHTML='<div style="font-size:12px;color:var(--text3);margin-bottom:4px">No subtasks yet.</div>';return;}
    listEl.innerHTML=subtasks.map(function(entry){
      var sid=entry[0],s=entry[1];
      var dlTag='';
      if(s.deadline&&!s.done){
        var diff=deadlineDiff(s.deadline);
        if(diff!==null){
          if(diff<0) dlTag='<span class="deadline-tag dl-overdue">⏰ overdue '+Math.abs(diff)+'d</span>';
          else if(diff===0) dlTag='<span class="deadline-tag dl-soon">⏰ today</span>';
          else if(diff<=3) dlTag='<span class="deadline-tag dl-soon">⏰ in '+diff+'d</span>';
          else dlTag='<span class="deadline-tag dl-ok">📅 '+s.deadline+'</span>';
        }
      }
      return '<div class="subtask-item'+(s.done?' done-task':'')+'">'
        +'<div class="subtask-check'+(s.done?' checked':'')+'" onclick="toggleSubtask(\''+sid+'\','+s.done+')"></div>'
        +'<span class="subtask-text">'+s.text+'</span>'
        +(dlTag?dlTag:'')
        +'<span class="subtask-assignee">'+s.createdBy+'</span>'
        +'<button class="btn-icon" onclick="deleteSubtask(\''+sid+'\')" title="Remove">✕</button>'
        +'</div>';
    }).join('');
  }

  // ── Links ─────────────────────────────────────────────────
  window.addLink=function(){
    if(!selectedTicketId)return;
    var urlInput=document.getElementById('link-url-input');
    var labelInput=document.getElementById('link-label-input');
    var url=urlInput.value.trim(); if(!url)return;
    url=ensureHttp(url);
    var label=labelInput.value.trim()||url;
    db.ref('tickets/'+selectedTicketId+'/links').push({url:url,label:label,addedBy:currentUser||'Unknown',ts:Date.now()});
    urlInput.value=''; labelInput.value='';
  };

  window.deleteLink=function(linkId){
    if(!selectedTicketId)return;
    db.ref('tickets/'+selectedTicketId+'/links/'+linkId).remove();
  };

  function renderLinks(ticketId){
    var t=allTickets[ticketId]; if(!t)return;
    var links=t.links?Object.entries(t.links).sort(function(a,b){return (a[1].ts||0)-(b[1].ts||0);}):[];
    var el=document.getElementById('d-link-list'); if(!el)return;
    if(!links.length){el.innerHTML='<div style="font-size:12px;color:var(--text3);margin-bottom:4px">No links yet.</div>';return;}
    el.innerHTML=links.map(function(entry){
      var lid=entry[0],l=entry[1];
      return '<div class="link-item"><span class="link-icon">🔗</span><span class="link-label">'+l.label+'</span><a class="link-url" href="'+l.url+'" target="_blank" rel="noopener">'+l.url+'</a><button class="btn-icon" onclick="deleteLink(\''+lid+'\')" title="Remove">✕</button></div>';
    }).join('');
  }

  // ── Comments ──────────────────────────────────────────────
  window.postComment=function(){
    if(!selectedTicketId)return;
    var input=document.getElementById('d-comment-input');
    var text=input.value.trim(); if(!text)return;
    db.ref('tickets/'+selectedTicketId+'/comments').push({author:currentUser||'Anonymous',text:text,time:fmtDate(),ts:Date.now()});
    input.value=''; replyingTo=null;
  };
  window.postReply=function(cid){
    var input=document.getElementById('reply-input-'+cid); if(!input)return;
    var text=input.value.trim(); if(!text)return;
    db.ref('tickets/'+selectedTicketId+'/comments/'+cid+'/replies').push({author:currentUser||'Anonymous',text:text,time:fmtDate(),ts:Date.now()});
    input.value=''; replyingTo=null;
  };
  window.toggleReplyBox=function(cid){
    document.querySelectorAll('.reply-box').forEach(function(el){el.style.display='none';});
    if(replyingTo===cid){replyingTo=null;return;}
    replyingTo=cid;
    var box=document.getElementById('reply-box-'+cid);
    if(box){box.style.display='flex';box.querySelector('input').focus();}
  };
  function renderComments(ticketId){
    var t=allTickets[ticketId]; if(!t)return;
    var comments=t.comments?Object.entries(t.comments).sort(function(a,b){return (a[1].ts||0)-(b[1].ts||0);}):[];
    document.getElementById('d-comment-count').textContent='Comments ('+countComments(t.comments)+')';
    if(!comments.length){document.getElementById('d-comments').innerHTML='<p style="font-size:12px;color:var(--text3);margin-bottom:8px">No comments yet.</p>';return;}
    document.getElementById('d-comments').innerHTML=comments.map(function(entry){
      var cid=entry[0],c=entry[1];
      var replies=c.replies?Object.entries(c.replies).sort(function(a,b){return (a[1].ts||0)-(b[1].ts||0);}):[];
      var rHtml=replies.length?'<div class="replies">'+replies.map(function(re){var r=re[1];return '<div class="comment" style="background:var(--surface3)"><div class="comment-header">'+avatarHtml(r.author,18)+'<span class="comment-author" style="font-size:12px">'+r.author+'</span><span class="comment-time">'+r.time+'</span></div><div class="comment-text">'+r.text+'</div></div>';}).join('')+'</div>':'';
      return '<div class="comment-thread"><div class="comment"><div class="comment-header">'+avatarHtml(c.author)+'<span class="comment-author">'+c.author+'</span><span class="comment-time">'+c.time+'</span></div><div class="comment-text">'+c.text+'</div><div class="comment-actions"><button class="btn btn-ghost" onclick="toggleReplyBox(\''+cid+'\')">↩ Reply</button></div></div>'+rHtml+'<div class="reply-box" id="reply-box-'+cid+'" style="display:none">'+avatarHtml(currentUser,20)+'<input id="reply-input-'+cid+'" placeholder="Reply to '+c.author+'..." onkeydown="if(event.key===\'Enter\')postReply(\''+cid+'\')" /><button class="btn btn-primary btn-sm" onclick="postReply(\''+cid+'\')">Reply</button></div></div>';
    }).join('');
  }

  // ── Detail modal ──────────────────────────────────────────
  window.openDetailModal=function(id){
    selectedTicketId=id;
    var t=allTickets[id]; if(!t)return;
    document.getElementById('d-id').textContent='#'+id.slice(-6).toUpperCase();
    document.getElementById('d-title').textContent=t.title;
    document.getElementById('d-desc').textContent=t.desc||'No description.';
    document.getElementById('d-priority-badge').className='priority-badge '+pbClass(t.priority);
    document.getElementById('d-priority-badge').textContent=t.priority||'medium';
    document.getElementById('d-status-badge').className='status-badge '+statusClass(t.status);
    document.getElementById('d-status-badge').textContent=t.status;
    document.getElementById('d-status-sel').value=t.status;
    document.getElementById('d-assignee-inp').value=t.assignee||'';
    document.getElementById('d-deadline-inp').value=t.deadline||'';
    renderDeadlineStatus(t.deadline,t.status);
    renderSubtasks(id);
    renderLinks(id);
    renderComments(id);
    updateWho();
    document.getElementById('detail-modal').style.display='flex';
    setTimeout(function(){var el=document.getElementById('d-comment-input');if(el)el.focus();},100);
  };

  // ── List rendering ────────────────────────────────────────
  window.renderList=function(){
    var search=(document.getElementById('search-input')||{value:''}).value.toLowerCase();
    var list=document.getElementById('ticket-list');
    var tickets=Object.entries(allTickets)
      .filter(function(e){return currentFilter==='all'||e[1].status===currentFilter;})
      .filter(function(e){return !search||e[1].title.toLowerCase().includes(search)||(e[1].assignee||'').toLowerCase().includes(search);})
      .sort(function(a,b){return pOrder(a[1].priority)-pOrder(b[1].priority)||(b[1].createdTs||0)-(a[1].createdTs||0);});
    if(!tickets.length){
      list.innerHTML='<div class="empty-state"><div style="font-size:28px;opacity:.3">◎</div><p>'+(Object.keys(allTickets).length===0?'No tickets yet. Create your first one!':'No tickets match this filter.')+'</p></div>';
      return;
    }
    list.innerHTML=tickets.map(function(entry){
      var id=entry[0],t=entry[1];
      var cc=t.comments?Object.values(t.comments).reduce(function(a,c){return a+1+(c.replies?Object.keys(c.replies).length:0);},0):0;
      var st=subtaskStats(t.subtasks);
      var lc=t.links?Object.keys(t.links).length:0;
      var sc=statusClass(t.status),col=colorFor(t.assignee);
      var dlTag=deadlineTagHtml(t.deadline,t.status);
      var diff=t.deadline?deadlineDiff(t.deadline):null;
      var tcls='ticket'+(diff!==null&&diff<0&&t.status!=='done'?' is-overdue':diff!==null&&diff<=3&&diff>=0&&t.status!=='done'?' is-soon':'');
      var subtaskBar=st.total>0?'<div class="subtask-bar"><div class="subtask-bar-fill" style="width:'+Math.round(st.done/st.total*100)+'%"></div></div>':'';
      return '<div class="'+tcls+'" onclick="openDetailModal(\''+id+'\')"><div class="ticket-left"><div class="priority-bar '+t.priority+'"></div></div><div class="ticket-body"><div class="ticket-id">#'+id.slice(-6).toUpperCase()+'</div><div class="ticket-title">'+t.title+'</div><div class="ticket-meta"><span style="width:20px;height:20px;border-radius:50%;background:'+col+'22;color:'+col+';display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0">'+initials(t.assignee)+'</span><span>'+(t.assignee||'Unassigned')+'</span><span>·</span><span>'+(t.created||'')+'</span>'+(cc?'<span>· 💬 '+cc+'</span>':'')+(st.total?'<span>· ☑ '+st.done+'/'+st.total+'</span>':'')+(lc?'<span>· 🔗 '+lc+'</span>':'')+(dlTag?'<span>'+dlTag+'</span>':'')+'</div>'+subtaskBar+'</div><div class="ticket-right"><span class="status-badge '+sc+'">'+t.status+'</span></div></div>';
    }).join('');
  };

  function updateStats(){
    var t=Object.values(allTickets);
    document.getElementById('s-total').textContent=t.length;
    document.getElementById('s-open').textContent=t.filter(function(x){return x.status==='open';}).length;
    document.getElementById('s-prog').textContent=t.filter(function(x){return x.status==='in progress';}).length;
    document.getElementById('s-done').textContent=t.filter(function(x){return x.status==='done';}).length;
    document.getElementById('ticket-count-sub').textContent=t.length+' ticket'+(t.length!==1?'s':'')+' total';
  }
  function updateCounts(){
    var t=Object.values(allTickets);
    document.getElementById('cnt-all').textContent=t.length;
    document.getElementById('cnt-open').textContent=t.filter(function(x){return x.status==='open';}).length;
    document.getElementById('cnt-in progress').textContent=t.filter(function(x){return x.status==='in progress';}).length;
    document.getElementById('cnt-review').textContent=t.filter(function(x){return x.status==='review';}).length;
    document.getElementById('cnt-done').textContent=t.filter(function(x){return x.status==='done';}).length;
  }
  window.setFilter=function(f){
    currentFilter=f;
    document.querySelectorAll('.nav-item').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.filter-pill').forEach(function(b){b.classList.remove('active');});
    var n=document.getElementById('nav-'+f),p=document.getElementById('pill-'+f);
    if(n)n.classList.add('active');if(p)p.classList.add('active');
    renderList();
  };
  window.openNewModal=function(){ document.getElementById('new-modal').style.display='flex'; setTimeout(function(){document.getElementById('nt-title').focus();},100); };
  window.closeNewModal=function(){ document.getElementById('new-modal').style.display='none'; ['nt-title','nt-desc','nt-assignee','nt-deadline'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';}); };
  window.closeDetailModal=function(){ document.getElementById('detail-modal').style.display='none'; selectedTicketId=null; };

}); // end load
</script>
</body>
</html>
